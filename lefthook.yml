commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    format:
      # No glob — prettier's --ignore-unknown flag handles unknown file types
      # silently, and the absence of a glob ensures root-level files (e.g.
      # README.md, .lighthouserc.cjs) are not skipped by glob path-separator
      # matching quirks in lefthook v2.
      priority: 1
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    audit:
      # Run after format so lock-file changes from audit --fix get re-staged
      # alongside any prettier fixes. `|| true` prevents spurious hook
      # failures when no fixable vulnerabilities exist.
      priority: 1
      run: pnpm audit --fix || true
      stage_fixed: true
    eslint:
      priority: 2
      glob: "**/*.{js,ts,jsx,tsx,cjs,mjs}"
      run: pnpm exec eslint {staged_files}
    stylelint:
      priority: 2
      glob: "**/*.{css,scss}"
      run: pnpm exec stylelint {staged_files}
    trufflehog:
      priority: 2
      run: docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:3.93.4 git file:///pwd --fail
    actionlint:
      priority: 2
      glob: ".github/workflows/**/*.yml"
      run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.11 -color

pre-push:
  parallel: true
  commands:
    tests:
      run: pnpm test
    build:
      run: pnpm run build
